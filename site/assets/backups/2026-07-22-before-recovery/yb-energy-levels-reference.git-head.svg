<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1480" viewBox="0 0 1600 1480" role="img" aria-labelledby="title description">
  <title id="title">¹⁷¹Yb 亚稳态核自旋量子比特能级与擦除检测</title>
  <desc id="description">¹⁷¹Yb 的主能级、399、556、578.4、302 和约369纳米通道，以及Rydberg态衰变、770纳米再泵浦和擦除检测流程。</desc>
  <defs>
    <marker id="arrow-ink" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#15211e"/></marker>
<marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#1f5fd1"/></marker>
<marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#187a44"/></marker>
<marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#e74b22"/></marker>
<marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#5b33c5"/></marker>
<marker id="arrow-wine" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#9c1743"/></marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #15211e; letter-spacing: 0; }
      .title { font-size: 36px; font-weight: 700; }
      .subtitle { font-size: 21px; font-weight: 700; }
      .level { font-size: 26px; font-weight: 600; }
      .body { font-size: 20px; }
      .small { font-size: 18px; }
      .tiny { font-size: 17px; }
      .micro { font-size: 15px; }
      .card-title { font-size: 19px; font-weight: 700; }
      .section-title { font-size: 23px; font-weight: 700; }
      .energy-line { stroke: #15211e; stroke-width: 4; stroke-linecap: round; }
      .thin-line { stroke: #15211e; stroke-width: 2.5; }
    </style>
  </defs>
  <rect width="1600" height="1480" fill="#ffffff"/>

  <text x="800" y="46" class="title" text-anchor="middle">¹⁷¹Yb 亚稳态核自旋量子比特：能级、Rydberg 激发、成像与读出通道</text>
  <rect x="22" y="62" width="248" height="48" rx="8" fill="#ffffff" stroke="#15211e" stroke-width="1.5"/>
  <text x="40" y="94" class="body" font-weight="700">¹⁷¹Yb：核自旋 I = 1/2</text>
  <rect x="22" y="124" width="250" height="84" rx="7" fill="#fff9e8" stroke="#b7a26e" stroke-width="1.3"/>
  <text x="39" y="148" class="tiny" fill="#15211e" font-weight="400">示意图：纵向间距</text>
<text x="39" y="167" class="tiny" fill="#15211e" font-weight="400">不按真实能量比例</text>
<text x="39" y="186" class="tiny" fill="#15211e" font-weight="400">数值为 E/hc，相对 ¹S₀</text>
<text x="39" y="205" class="tiny" fill="#15211e" font-weight="400">¹⁷¹Yb 超精细分裂未画</text>

  <!-- Main energy axis -->
  <line x1="72" y1="835" x2="72" y2="210" stroke="#15211e" stroke-width="3" marker-end="url(#arrow-ink)"/>
  <text transform="translate(31 525) rotate(-90)" class="small" text-anchor="middle">E/hc（cm⁻¹）</text>

  <line x1="350" y1="820" x2="930" y2="820" class="energy-line"/>
  <line x1="440" y1="620" x2="930" y2="620" class="energy-line"/>
  <line x1="440" y1="500" x2="710" y2="500" class="energy-line"/>
  <line x1="440" y1="380" x2="710" y2="380" class="energy-line"/>
  <line x1="440" y1="240" x2="930" y2="240" class="energy-line"/>
  <line x1="680" y1="100" x2="925" y2="100" class="energy-line"/>
  <line x1="680" y1="145" x2="850" y2="145" stroke="#15211e" stroke-width="2.5" stroke-dasharray="8 7"/>

  <text x="168" y="827" class="level">1   6s² ¹S₀</text>
  <text x="955" y="827" class="small">0 cm⁻¹</text>
  <text x="278" y="627" class="level">2   6s6p ³P₀</text>
  <text x="955" y="627" class="small">17288.439 cm⁻¹</text>
  <text x="278" y="507" class="level">3   6s6p ³P₁</text>
  <text x="730" y="507" class="small">17992.007 cm⁻¹</text>
  <text x="278" y="387" class="level">4   6s6p ¹P₁</text>
  <text x="730" y="387" class="small">25068.222 cm⁻¹</text>
  <text x="270" y="248" class="level">5   6s59s ³S₁</text>
  <text x="628" y="226" class="body" text-anchor="middle">|r⟩ = |6s59s ³S₁, F=3/2, mF=3/2⟩</text>
  <text x="780" y="263" class="small">Rydberg 态</text>
  <text x="470" y="108" class="body">6p₁/₂59s 自动电离态</text>
  <text x="1035" y="151" class="body">Yb⁺ + e⁻ 连续区</text>

  <text x="945" y="846" class="micro" fill="#53615d">箭头图例：彩色=激光耦合/激发；黑色=衰变；虚线=示意分支</text>

  <!-- Main transitions -->
  <line x1="255" y1="812" x2="255" y2="388" stroke="#1f5fd1" stroke-width="3" marker-start="url(#arrow-blue)" marker-end="url(#arrow-blue)"/>
  <text x="122" y="540" class="body" fill="#1f5fd1" font-weight="700">399 nm</text>
<text x="122" y="564" class="body" fill="#1f5fd1" font-weight="700">快速基态成像</text>
  <g transform="translate(128 620)" stroke="#15211e" fill="none" stroke-width="3">
    <rect x="0" y="8" width="46" height="34" rx="4"/>
    <path d="M10 8 L16 0 H30 L36 8"/>
    <circle cx="23" cy="25" r="10"/>
  </g>
  <line x1="151" y1="611" x2="151" y2="580" stroke="#1f5fd1" stroke-width="2" stroke-dasharray="4 4"/>

  <line x1="398" y1="812" x2="398" y2="508" stroke="#187a44" stroke-width="3" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)"/>
  <text x="290" y="716" class="body" fill="#187a44" font-weight="700">556 nm</text>
<text x="290" y="740" class="body" fill="#187a44" font-weight="700">窄线冷却/成像</text>
  <g transform="translate(300 753)" stroke="#15211e" fill="none" stroke-width="3">
    <rect x="0" y="8" width="46" height="34" rx="4"/>
    <path d="M10 8 L16 0 H30 L36 8"/>
    <circle cx="23" cy="25" r="10"/>
  </g>

  <line x1="430" y1="812" x2="430" y2="628" stroke="#e74b22" stroke-width="2.5" stroke-dasharray="8 7" marker-start="url(#arrow-orange)" marker-end="url(#arrow-orange)"/>
  <text x="448" y="716" class="body" fill="#e74b22" font-weight="700">578.4 nm</text>
<text x="448" y="740" class="body" fill="#e74b22" font-weight="700">钟跃迁</text>

  <line x1="860" y1="612" x2="860" y2="248" stroke="#5b33c5" stroke-width="3" marker-start="url(#arrow-purple)" marker-end="url(#arrow-purple)"/>
  <text x="880" y="430" class="level" fill="#5b33c5" font-weight="700">302 nm</text>
<text x="880" y="459" class="level" fill="#5b33c5" font-weight="700">ΩUV</text>

  <line x1="850" y1="232" x2="850" y2="108" stroke="#9c1743" stroke-width="3" marker-end="url(#arrow-wine)"/>
  <text x="715" y="162" class="body" fill="#9c1743" font-weight="700">约369 nm</text>
<text x="715" y="186" class="body" fill="#9c1743" font-weight="700">离子实激发</text>
  <path d="M925 100 C965 100 970 145 1025 145" fill="none" stroke="#9c1743" stroke-width="3" marker-end="url(#arrow-wine)"/>
  <text x="940" y="122" class="small" fill="#9c1743" font-weight="700">自动电离</text>

  <!-- Nuclear-spin qubit -->
  <text x="315" y="664" class="small">|0⟩ = |³P₀, F=1/2, mF=−1/2⟩</text>
  <text x="735" y="664" class="small">|1⟩ = |³P₀, F=1/2, mF=+1/2⟩</text>
  <line x1="585" y1="650" x2="750" y2="650" stroke="#15211e" stroke-width="2.5" marker-start="url(#arrow-ink)" marker-end="url(#arrow-ink)"/>
  <text x="668" y="687" class="body" text-anchor="middle" font-weight="700">RF 核自旋驱动 ΩRF</text>
  <text x="590" y="716" class="small" fill="#15211e" font-weight="400">Ma 2023：B = 5.0 G，νL = 5.70 kHz</text>
<text x="590" y="739" class="small" fill="#15211e" font-weight="400">π 脉冲约 2.0 ms</text>

  <!-- Key parameter cards -->
  <text x="1420" y="78" class="section-title" text-anchor="middle">关键信息卡片</text>
  <rect x="1260" y="90" width="318" height="142" rx="8" fill="#ffffff" stroke="#1f5fd1" stroke-width="2"/>
<text x="1278" y="119" class="card-title" fill="#1f5fd1" font-weight="700">1  399 nm：快速基态检测</text>
<text x="1278" y="146" class="tiny" fill="#15211e" font-weight="400">¹S₀ ↔ ¹P₁；Γ/2π ≈ 29 MHz</text>
<text x="1278" y="169" class="tiny" fill="#15211e" font-weight="400">20 μs；识别保真度 0.986</text>
<text x="1278" y="192" class="tiny" fill="#15211e" font-weight="400">检测已回到基态的原子</text>
  <rect x="1260" y="240" width="318" height="142" rx="8" fill="#ffffff" stroke="#187a44" stroke-width="2"/>
<text x="1278" y="269" class="card-title" fill="#187a44" font-weight="700">2  556 nm：窄线冷却/成像</text>
<text x="1278" y="296" class="tiny" fill="#15211e" font-weight="400">¹S₀ ↔ ³P₁；Γ/2π ≈ 182 kHz</text>
<text x="1278" y="319" class="tiny" fill="#15211e" font-weight="400">窄线 MOT 与低损伤成像</text>
<text x="1278" y="342" class="tiny" fill="#15211e" font-weight="400">15 ms；保真度/存活率约 0.995</text>
  <rect x="1260" y="390" width="318" height="142" rx="8" fill="#ffffff" stroke="#e74b22" stroke-width="2"/>
<text x="1278" y="419" class="card-title" fill="#e74b22" font-weight="700">3  578.4 nm：钟态映射</text>
<text x="1278" y="446" class="tiny" fill="#15211e" font-weight="400">¹S₀ ↔ ³P₀ 钟跃迁</text>
<text x="1278" y="469" class="tiny" fill="#15211e" font-weight="400">相干映射与钟态控制</text>
<text x="1278" y="492" class="tiny" fill="#15211e" font-weight="400">Ma 2023 使用光泵浦初始化</text>
  <rect x="1260" y="540" width="318" height="142" rx="8" fill="#ffffff" stroke="#5b33c5" stroke-width="2"/>
<text x="1278" y="569" class="card-title" fill="#5b33c5" font-weight="700">4  302 nm：Rydberg 激发</text>
<text x="1278" y="596" class="tiny" fill="#15211e" font-weight="400">|1⟩ ↔ |r⟩；ΩUV/2π ≈ 1.6 MHz</text>
<text x="1278" y="619" class="tiny" fill="#15211e" font-weight="400">π脉冲330 ns；功率约6 mW</text>
<text x="1278" y="642" class="tiny" fill="#15211e" font-weight="400">光束腰 w₀ ≈ 10 μm</text>
  <rect x="1260" y="690" width="318" height="142" rx="8" fill="#ffffff" stroke="#9c1743" stroke-width="2"/>
<text x="1278" y="719" class="card-title" fill="#9c1743" font-weight="700">5  约369 nm：自动电离</text>
<text x="1278" y="746" class="tiny" fill="#15211e" font-weight="400">6s59s ³S₁ → 6p₁/₂59s</text>
<text x="1278" y="769" class="tiny" fill="#15211e" font-weight="400">→ Yb⁺ + e⁻；态选择性移除</text>
<text x="1278" y="792" class="tiny" fill="#15211e" font-weight="400">用于最终核自旋态读出</text>

  <!-- Bottom process band -->
  <line x1="0" y1="870" x2="1600" y2="870" stroke="#15211e" stroke-width="2"/>
  <text x="800" y="905" class="section-title" text-anchor="middle">Rydberg 态衰变、770 nm 再泵浦（repump）与擦除检测（Ma 2023）</text>
  <text x="800" y="930" class="small" text-anchor="middle" fill="#53615d">以下为初始制备在 |r⟩ 态的原子经等待和再泵浦后的实验布居比例；不是普适分支比，也不是门错误率。</text>

  <!-- Stage A -->
  <rect x="18" y="950" width="520" height="505" rx="10" fill="#fcfbff" stroke="#5b33c5" stroke-width="2"/>
  <text x="278" y="980" class="section-title" text-anchor="middle" fill="#5b33c5">阶段 A：等待 Rydberg 态衰变</text>
  <rect x="38" y="1040" width="160" height="228" rx="8" fill="#ffffff" stroke="#5b33c5" stroke-width="2"/>
<text x="56" y="1069" class="card-title" fill="#5b33c5" font-weight="700">初始 |r⟩</text>
<text x="56" y="1096" class="small" fill="#15211e" font-weight="400">6s59s ³S₁</text>
<text x="56" y="1121" class="small" fill="#15211e" font-weight="400">F=3/2</text>
<text x="56" y="1146" class="small" fill="#15211e" font-weight="400">mF=3/2</text>
<text x="56" y="1171" class="small" fill="#15211e" font-weight="400"></text>
<text x="56" y="1196" class="small" fill="#15211e" font-weight="400">等待约</text>
<text x="56" y="1221" class="small" fill="#15211e" font-weight="400">400 μs</text>
  <rect x="225" y="995" width="290" height="94" rx="8" fill="#ffffff" stroke="#1f5fd1" stroke-width="2"/>
<text x="243" y="1024" class="card-title" fill="#1f5fd1" font-weight="700">约25%：回到 ¹S₀</text>
<text x="243" y="1051" class="tiny" fill="#15211e" font-weight="400">399 nm 可检测，形成擦除标记</text>
  <rect x="225" y="1101" width="290" height="110" rx="8" fill="#ffffff" stroke="#e74b22" stroke-width="2"/>
<text x="243" y="1130" class="card-title" fill="#e74b22" font-weight="700">约10%：回到 ³P₀</text>
<text x="243" y="1157" class="tiny" fill="#15211e" font-weight="400">返回亚稳态，不等于恢复量子态</text>
<text x="243" y="1179" class="tiny" fill="#15211e" font-weight="400">未额外检测时可成为隐藏错误</text>
  <rect x="225" y="1223" width="290" height="94" rx="8" fill="#ffffff" stroke="#187a44" stroke-width="2"/>
<text x="243" y="1252" class="card-title" fill="#187a44" font-weight="700">约35%：进入 ³P₂</text>
<text x="243" y="1279" class="tiny" fill="#15211e" font-weight="400">需770 nm再泵浦；399 nm不直接探测</text>
  <rect x="225" y="1329" width="290" height="104" rx="8" fill="#ffffff" stroke="#5b33c5" stroke-width="2"/>
<text x="243" y="1358" class="card-title" fill="#5b33c5" font-weight="700">约30%：未计入上述能级</text>
<text x="243" y="1385" class="tiny" fill="#15211e" font-weight="400">其他Rydberg态、损失或泄漏通道</text>
<text x="243" y="1407" class="tiny" fill="#15211e" font-weight="400">不能直接计为已知位置的擦除</text>
  <path d="M198 1148 L212 1148 L212 1042 L225 1042" fill="none" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <path d="M198 1148 L225 1156" fill="none" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <path d="M198 1148 L212 1148 L212 1270 L225 1270" fill="none" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <path d="M198 1148 L212 1148 L212 1380 L225 1380" fill="none" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>

  <!-- Stage B -->
  <rect x="558" y="950" width="360" height="505" rx="10" fill="#fbfefc" stroke="#187a44" stroke-width="2"/>
  <text x="738" y="980" class="section-title" text-anchor="middle" fill="#187a44">阶段 B：770 nm 再泵浦 ³P₂</text>
  <line x1="600" y1="1040" x2="690" y2="1040" class="thin-line"/>
  <line x1="600" y1="1120" x2="690" y2="1120" class="thin-line"/>
  <line x1="600" y1="1210" x2="690" y2="1210" class="thin-line"/>
  <line x1="600" y1="1290" x2="690" y2="1290" class="thin-line"/>
  <line x1="600" y1="1390" x2="690" y2="1390" class="thin-line"/>
  <text x="645" y="1027" class="small" text-anchor="middle">6s7s ³S₁</text>
  <text x="574" y="1127" class="body">³P₂</text>
  <text x="574" y="1217" class="body">³P₁</text>
  <text x="574" y="1297" class="body">³P₀</text>
  <text x="574" y="1397" class="body">¹S₀</text>
  <line x1="620" y1="1112" x2="620" y2="1048" stroke="#e74b22" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="635" y="1088" class="small" fill="#e74b22" font-weight="700">770 nm</text>
  <path d="M690 1040 H716 V1290" fill="none" stroke="#15211e" stroke-width="2"/>
  <line x1="716" y1="1120" x2="692" y2="1120" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <line x1="716" y1="1210" x2="692" y2="1210" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <line x1="716" y1="1290" x2="692" y2="1290" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <line x1="645" y1="1220" x2="645" y2="1380" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <rect x="738" y="1050" width="160" height="350" rx="8" fill="#ffffff" stroke="#187a44" stroke-width="1.5"/>
  <text x="752" y="1080" class="tiny" fill="#15211e" font-weight="400">770 nm：³P₂→</text>
<text x="752" y="1105" class="tiny" fill="#15211e" font-weight="400">6s7s ³S₁，随后</text>
<text x="752" y="1130" class="tiny" fill="#15211e" font-weight="400">自发衰变。</text>
<text x="752" y="1155" class="tiny" fill="#15211e" font-weight="400"></text>
<text x="752" y="1180" class="tiny" fill="#15211e" font-weight="400">非理想分支：</text>
<text x="752" y="1205" class="tiny" fill="#15211e" font-weight="400">约25%落入³P₀。</text>
<text x="752" y="1230" class="tiny" fill="#15211e" font-weight="400"></text>
<text x="752" y="1255" class="tiny" fill="#15211e" font-weight="400">替代再泵浦：经³D₂</text>
<text x="752" y="1280" class="tiny" fill="#15211e" font-weight="400">使用496.8/1983 nm。</text>

  <!-- Stage C -->
  <rect x="938" y="950" width="400" height="505" rx="10" fill="#fbfdff" stroke="#1f5fd1" stroke-width="2"/>
  <text x="1138" y="980" class="section-title" text-anchor="middle" fill="#1f5fd1">阶段 C：再泵浦后的末态布居</text>
  <text x="1138" y="1008" class="small" text-anchor="middle" fill="#1f5fd1" font-weight="700">布居比例：51% + 19% + 30% ≈ 100%</text>
  <rect x="962" y="1030" width="352" height="108" rx="8" fill="#ffffff" stroke="#1f5fd1" stroke-width="2"/>
<text x="980" y="1059" class="card-title" fill="#1f5fd1" font-weight="700">51%：最终位于 ¹S₀</text>
<text x="980" y="1086" class="tiny" fill="#15211e" font-weight="400">399 nm快速成像可探测</text>
<text x="980" y="1106" class="tiny" fill="#15211e" font-weight="400">形成位置已知的擦除标记</text>
  <rect x="962" y="1152" width="352" height="118" rx="8" fill="#ffffff" stroke="#e74b22" stroke-width="2"/>
<text x="980" y="1181" class="card-title" fill="#e74b22" font-weight="700">19%：最终位于 ³P₀</text>
<text x="980" y="1208" class="tiny" fill="#15211e" font-weight="400">回到亚稳态，不等于恢复原量子态</text>
<text x="980" y="1228" class="tiny" fill="#15211e" font-weight="400">原相位或核自旋信息可能丢失</text>
  <rect x="962" y="1284" width="352" height="118" rx="8" fill="#ffffff" stroke="#5b33c5" stroke-width="2"/>
<text x="980" y="1313" class="card-title" fill="#5b33c5" font-weight="700">约30%：未计入/泄漏通道</text>
<text x="980" y="1340" class="tiny" fill="#15211e" font-weight="400">其他Rydberg态或未探测损失</text>
<text x="980" y="1360" class="tiny" fill="#15211e" font-weight="400">不能直接计为已知位置的擦除</text>
  <line x1="1315" y1="1084" x2="1352" y2="1084" stroke="#1f5fd1" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="1260" y="1056" class="micro" fill="#1f5fd1" font-weight="700">399 nm</text>
