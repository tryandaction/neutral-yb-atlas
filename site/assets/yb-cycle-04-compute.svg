<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-labelledby="title description">
  <title id="title">Coherent gates while reload continues</title>
  <desc id="description">Stationary-array computation and reservoir replenishment occupy separate spatial domains.</desc>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#14211d"/></marker><style>
    text { font-family: Inter, "Noto Sans", Arial, sans-serif; letter-spacing: 0; }
    .title { font-size: 27px; font-weight: 700; } .subtitle { font-size: 17px; }
    .body { font-size: 17px; } .small { font-size: 15px; } .micro { font-size: 13px; } .stage { font-size: 10px; } .param { font-size: 11px; }
  </style></defs>
  <rect width="760" height="760" fill="#ffffff"/>
  <text x="22" y="28" class="stage" fill="#d84c2f" font-weight="700">COMPUTE DOMAIN</text>
  <text x="22" y="58" class="title">Coherent gates while reload continues</text>
  <text x="738" y="56" class="small" text-anchor="end" fill="#56635f" font-weight="700">04 / 05</text>
  <rect x="20" y="78" width="712" height="62" rx="3" fill="#f3f7f5" stroke="#c9d5d0"/>
  <text x="32" y="98" class="stage" fill="#176f4e" font-weight="700">REPORTED OPERATING POINT</text>
  <text x="176" y="116" class="param" fill="#263732">global RF: 5.0 G; fL=5.70 kHz; tπ=2.0 ms</text>
  <text x="176" y="134" class="param" fill="#263732">302 nm: 6 mW at atoms; w₀=10 µm; Ω/2π=1.6 MHz; tπ=330 ns</text>
  <rect x="176" y="150" width="192" height="42" rx="3" fill="#eaf3ef" stroke="none"/><text x="272" y="169" class="small" text-anchor="middle" font-weight="700">single-qubit control</text><text x="272" y="186" class="micro" text-anchor="middle" fill="#56635f">RF phase + duration</text>
<rect x="376" y="150" width="192" height="42" rx="3" fill="#f5f1fb" stroke="none"/><text x="472" y="169" class="small" text-anchor="middle" font-weight="700">Rydberg CZ control</text><text x="472" y="186" class="micro" text-anchor="middle" fill="#56635f">phase-shaped 302 nm pulse</text>
<rect x="576" y="150" width="156" height="42" rx="3" fill="#eef3fb" stroke="none"/><text x="654" y="169" class="small" text-anchor="middle" font-weight="700">record</text><text x="654" y="186" class="micro" text-anchor="middle" fill="#56635f">site + cycle + gate</text>
  <text x="22" y="232" class="body" font-weight="650">stationary compute</text><line x1="176" y1="236" x2="732" y2="236" stroke="#c9d1ce" stroke-width="1"/><rect x="184" y="219" width="540" height="26" rx="4" fill="#14211d" stroke="none"/><text x="454" y="237" class="micro" text-anchor="middle" fill="#fff" font-weight="700">stationary compute</text>
<text x="22" y="290" class="body" font-weight="650">global RF at 5.70 kHz</text><line x1="176" y1="294" x2="732" y2="294" stroke="#c9d1ce" stroke-width="1"/><rect x="214" y="277" width="126" height="26" rx="4" fill="#176f4e" stroke="none"/><text x="277" y="295" class="micro" text-anchor="middle" fill="#fff" font-weight="700">Rφ(θ)</text>
<rect x="598" y="277" width="82" height="26" rx="4" fill="#fff" stroke="#176f4e" stroke-width="2" stroke-dasharray="6 5"/><text x="639" y="295" class="micro" text-anchor="middle" fill="#176f4e" font-weight="700">phase ref.</text>
<text x="22" y="348" class="body" font-weight="650">302 nm |1⟩↔|r⟩</text><line x1="176" y1="352" x2="732" y2="352" stroke="#c9d1ce" stroke-width="1"/><rect x="402" y="335" width="140" height="26" rx="4" fill="#6845c6" stroke="none"/><text x="472" y="353" class="micro" text-anchor="middle" fill="#fff" font-weight="700">phase-shaped CZ</text>
<text x="22" y="406" class="body" font-weight="650">mobile reservoir</text><line x1="176" y1="410" x2="732" y2="410" stroke="#c9d1ce" stroke-width="1"/><rect x="184" y="393" width="540" height="26" rx="4" fill="#fff" stroke="#2864c7" stroke-width="2" stroke-dasharray="6 5"/><text x="454" y="411" class="micro" text-anchor="middle" fill="#2864c7" font-weight="700">reload continues in parallel</text>
<text x="22" y="464" class="body" font-weight="650">cooling / imaging</text><line x1="176" y1="468" x2="732" y2="468" stroke="#c9d1ce" stroke-width="1"/><rect x="184" y="451" width="540" height="26" rx="4" fill="#fff" stroke="#176f4e" stroke-width="2" stroke-dasharray="6 5"/><text x="454" y="469" class="micro" text-anchor="middle" fill="#176f4e" font-weight="700">confined to reservoir domain</text>
<text x="22" y="522" class="body" font-weight="650">controller record</text><line x1="176" y1="526" x2="732" y2="526" stroke="#c9d1ce" stroke-width="1"/><line x1="568" y1="508" x2="568" y2="536" stroke="#d84c2f" stroke-width="4"/><text x="575" y="522" class="micro" fill="#d84c2f" font-weight="700">append gate log</text>
  <line x1="20" y1="574" x2="740" y2="574" stroke="#14211d" stroke-width="1.5"/>
  <text x="22" y="608" class="body">RF nuclear-spin control is the global metastable-manifold X/Y primitive (Ma et al. 2023).</text>
<text x="22" y="633" class="body">302 nm Rydberg reference denotes the independently calibrated |1m⟩ ↔ |r⟩ interface.</text>
<text x="22" y="658" class="body">These gate durations are not inferred from the horizontal width of the replacement schedule.</text>
  <text x="22" y="735" class="micro" fill="#56635f">Li et al. (2025) parallel architecture; Ma et al. (2023) gate references.</text>
</svg>
