<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1500" viewBox="0 0 1600 1500" role="img" aria-labelledby="title description">
  <title id="title">¹⁷¹Yb 核自旋量子比特能级、Raman 控制与擦除检测</title>
  <desc id="description">用一个通用 Raman Λ 结构汇总 ¹S₀、³P₀、³P₂ 与跨流形控制通道，并标出 ³P₀ 核自旋计算基的 Rydberg 两比特接口和能级化擦除检测流程。</desc>
  <defs><marker id="arrow-ink" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#15211e"/></marker>
<marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#1f5fd1"/></marker>
<marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#187a44"/></marker>
<marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#e74b22"/></marker>
<marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#5b33c5"/></marker>
<marker id="arrow-wine" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#9c1743"/></marker><style>
    text { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #15211e; letter-spacing: 0; }
    .title { font-size: 34px; font-weight: 700; } .level { font-size: 25px; font-weight: 650; }
    .body { font-size: 20px; } .small { font-size: 18px; } .tiny { font-size: 17px; } .micro { font-size: 15px; }
    .card-title { font-size: 18px; font-weight: 700; } .section-title { font-size: 23px; font-weight: 700; }
    .energy-line { stroke: #15211e; stroke-width: 4; stroke-linecap: round; } .thin-line { stroke: #15211e; stroke-width: 2.5; }
  </style></defs>
  <rect width="1600" height="1500" fill="#ffffff"/>

  <text x="800" y="44" class="title" text-anchor="middle">¹⁷¹Yb 核自旋量子比特：能级、Raman 控制与 Rydberg 接口</text>
  <rect x="20" y="62" width="250" height="48" rx="8" fill="#ffffff" stroke="#15211e" stroke-width="1.5"/>
  <text x="38" y="94" class="body" font-weight="700">¹⁷¹Yb：核自旋 I = 1/2</text>
  <rect x="20" y="122" width="252" height="78" rx="7" fill="#fff9e8" stroke="#b7a26e" stroke-width="1.3"/>
  <text x="38" y="147" class="micro" fill="#15211e" font-weight="400">示意图：纵向间距</text>
<text x="38" y="167" class="micro" fill="#15211e" font-weight="400">不按真实能量比例</text>
<text x="38" y="187" class="micro" fill="#15211e" font-weight="400">未展开超精细与 Zeeman 分裂</text>

  <!-- Main energy ladder -->
  <line x1="340" y1="620" x2="1120" y2="620" class="energy-line"/>
  <line x1="430" y1="520" x2="1120" y2="520" class="energy-line"/>
  <line x1="430" y1="430" x2="760" y2="430" class="energy-line"/>
  <line x1="430" y1="340" x2="760" y2="340" class="energy-line"/>
  <line x1="650" y1="200" x2="1120" y2="200" class="energy-line"/>
  <line x1="760" y1="90" x2="1110" y2="90" class="energy-line"/>
  <line x1="760" y1="138" x2="940" y2="138" class="thin-line" stroke-dasharray="8 7"/>

  <circle cx="164" cy="620" r="9" fill="#fff" stroke="#1f5fd1" stroke-width="3"/><text x="184" y="628" class="level">6s² ¹S₀</text>
  <circle cx="268" cy="520" r="9" fill="#fff" stroke="#e74b22" stroke-width="3"/><text x="288" y="528" class="level">6s6p ³P₀</text>
  <circle cx="268" cy="430" r="9" fill="#fff" stroke="#187a44" stroke-width="3"/><text x="288" y="438" class="level">6s6p ³P₁</text>
  <circle cx="268" cy="340" r="9" fill="#fff" stroke="#1f5fd1" stroke-width="3"/><text x="288" y="348" class="level">6s6p ¹P₁</text>
  <circle cx="258" cy="200" r="9" fill="#fff" stroke="#5b33c5" stroke-width="3"/><text x="278" y="208" class="level">6s59s ³S₁</text>
  <text x="820" y="184" class="body" text-anchor="middle">|r⟩ = |6s59s ³S₁, F=3/2, mF=3/2⟩</text>
  <circle cx="738" cy="90" r="9" fill="#fff" stroke="#9c1743" stroke-width="3"/><text x="760" y="78" class="body">6p₁/₂ 59s 自动电离态</text>
  <text x="1000" y="146" class="body">Yb⁺ + e⁻ 连续区</text>

  <!-- Main optical transitions -->
  <line x1="250" y1="610" x2="250" y2="350" stroke="#1f5fd1" stroke-width="3" marker-start="url(#arrow-blue)" marker-end="url(#arrow-blue)"/>
  <text x="108" y="430" class="body" fill="#1f5fd1" font-weight="700">399 nm</text>
<text x="108" y="457" class="body" fill="#1f5fd1" font-weight="700">快速基态成像</text><g transform="translate(118 510)" stroke="#15211e" fill="none" stroke-width="3">
    <rect x="0" y="8" width="46" height="34" rx="4"/><path d="M10 8 L16 0 H30 L36 8"/><circle cx="23" cy="25" r="10"/>
  </g>
  <line x1="390" y1="610" x2="390" y2="440" stroke="#187a44" stroke-width="3" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)"/>
  <text x="292" y="564" class="small" fill="#187a44" font-weight="700">556 nm</text>
<text x="292" y="587" class="small" fill="#187a44" font-weight="700">窄线冷却/成像</text>
  <line x1="510" y1="610" x2="510" y2="530" stroke="#e74b22" stroke-width="2.5" stroke-dasharray="8 7" marker-start="url(#arrow-orange)" marker-end="url(#arrow-orange)"/>
  <text x="528" y="574" class="small" fill="#e74b22" font-weight="700">578.4 nm 钟跃迁</text>
  <line x1="1000" y1="510" x2="1000" y2="210" stroke="#5b33c5" stroke-width="3" marker-start="url(#arrow-purple)" marker-end="url(#arrow-purple)"/>
  <text x="1020" y="346" class="level" fill="#5b33c5" font-weight="700">302 nm</text>
<text x="1020" y="380" class="level" fill="#5b33c5" font-weight="700">ΩRyd</text>
  <text x="990" y="548" class="micro" text-anchor="middle" fill="#5b33c5" font-weight="700">两比特计算基：|0⟩, |1⟩ ∈ ³P₀</text>
  <text x="990" y="570" class="micro" text-anchor="middle" fill="#5b33c5" font-weight="700">302 nm：³P₀ |1⟩ ↔ |r⟩</text>
  <line x1="990" y1="190" x2="990" y2="100" stroke="#9c1743" stroke-width="3" marker-end="url(#arrow-wine)"/>
  <text x="858" y="126" class="small" fill="#9c1743" font-weight="700">约369 nm</text>
<text x="858" y="151" class="small" fill="#9c1743" font-weight="700">离子实激发</text>
  <path d="M1110 90 C1140 90 1145 138 1190 138" fill="none" stroke="#9c1743" stroke-width="3" marker-end="url(#arrow-wine)"/>
  <text x="1095" y="116" class="micro" fill="#9c1743" font-weight="700">自动电离</text>

  <!-- Raman Lambda control map -->
  <g id="raman-lambda-control-map">
    <rect x="300" y="645" width="860" height="245" rx="9" fill="#f8faf9" stroke="#b9c3c0" stroke-width="1.5"/>
    <text x="320" y="675" class="card-title" fill="#15211e" font-weight="700">Raman Λ 控制接口</text>

    <line x1="455" y1="696" x2="555" y2="696" class="thin-line"/>
    <text x="560" y="675" class="micro" text-anchor="middle" fill="#53615d">|e⟩（真实中间态）</text>
    <line x1="455" y1="718" x2="555" y2="718" class="thin-line" stroke-dasharray="7 6"/>
    <text x="570" y="723" class="micro" fill="#53615d">虚能级</text>
    <line x1="440" y1="696" x2="440" y2="718" stroke="#15211e" stroke-width="1.5"/>
    <line x1="435" y1="696" x2="445" y2="696" stroke="#15211e" stroke-width="1.5"/>
    <line x1="435" y1="718" x2="445" y2="718" stroke="#15211e" stroke-width="1.5"/>
    <text x="320" y="712" class="micro" font-weight="700">单光子失谐 Δ</text>
    <line x1="340" y1="765" x2="420" y2="765" class="thin-line"/>
    <line x1="510" y1="765" x2="590" y2="765" class="thin-line"/>
    <text x="380" y="785" class="tiny" text-anchor="middle" font-weight="700">|0⟩</text>
    <text x="550" y="785" class="tiny" text-anchor="middle" font-weight="700">|1⟩</text>
    <line x1="380" y1="757" x2="488" y2="722" stroke="#187a44" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <line x1="550" y1="757" x2="522" y2="722" stroke="#5b33c5" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
    <text x="360" y="738" class="micro" fill="#187a44" font-weight="700">ωa, Ωa</text>
    <text x="525" y="738" class="micro" fill="#5b33c5" font-weight="700">ωb, Ωb</text>

    <text x="650" y="706" class="tiny" font-weight="700">δ=(ωa−ωb)−ω01</text>
    <text x="650" y="733" class="tiny">Ω₂γ≈ΩaΩb*/(2Δ)</text>
    <text x="650" y="760" class="micro" fill="#53615d">条件：|Δ|≫|Ωa,b|, Γ</text>
    <line x1="310" y1="790" x2="1150" y2="790" stroke="#b9c3c0" stroke-width="1"/>

    <rect x="312" y="797" width="836" height="19" rx="3" fill="#edf4f1" stroke="none" stroke-width="0"/>
    <text x="320" y="812" class="micro" fill="#187a44" font-weight="700">¹S₀｜556+556 nm → ³P₁(F′=1/2)</text>
    <text x="700" y="812" class="micro">Δ/2π≈−5 GHz；Ω₂γ/2π≈7 kHz；磁 RF：ωd=ωZ</text>

    <text x="320" y="835" class="micro" fill="#e74b22" font-weight="700">³P₀｜649+649 nm → 6s7s ³S₁</text>
    <text x="700" y="835" class="micro">Jenkins 2022 提案：局域 Raman；参数依装置</text>

    <rect x="312" y="843" width="836" height="19" rx="3" fill="#edf4f1" stroke="none" stroke-width="0"/>
    <text x="320" y="858" class="micro" fill="#9c1743" font-weight="700">³P₂｜770+770 nm → 6s7s ³S₁(F′=3/2,mF′=−3/2)</text>
    <text x="760" y="858" class="micro">ΔQB/2π=+20 GHz；ΩQB/2π=2 MHz；B=10 G（理论模拟）</text>

    <text x="320" y="881" class="micro" fill="#5b33c5" font-weight="700">³P₀↔³P₂｜649+770 nm → 6s7s ³S₁</text>
    <text x="700" y="881" class="micro">Δ/2π≈12 GHz；Ω₂γ/2π=1.08 MHz；B=8.5 G（Li 2025 态映射）</text>
  </g>

  <!-- Key parameter cards -->
  <text x="1395" y="55" class="section-title" text-anchor="middle">关键信息卡片</text>
  <rect x="1210" y="70" width="370" height="132" rx="8" fill="#ffffff" stroke="#1f5fd1" stroke-width="2"/>
<text x="1227" y="97" class="card-title" fill="#1f5fd1" font-weight="700">399 nm：快速基态检测</text>
<text x="1227" y="121" class="tiny" fill="#15211e" font-weight="400">¹S₀ ↔ ¹P₁；Γ/2π≈29 MHz</text>
<text x="1227" y="145" class="tiny" fill="#15211e" font-weight="400">20 μs；识别保真度 0.986</text>
<text x="1227" y="169" class="tiny" fill="#15211e" font-weight="400">计算作用：基态占据判别与擦除标记</text>
  <rect x="1210" y="214" width="370" height="132" rx="8" fill="#ffffff" stroke="#187a44" stroke-width="2"/>
<text x="1227" y="241" class="card-title" fill="#187a44" font-weight="700">556 nm：冷却、成像与基态 Raman</text>
<text x="1227" y="265" class="tiny" fill="#15211e" font-weight="400">¹S₀ ↔ ³P₁；Γ/2π≈182 kHz</text>
<text x="1227" y="289" class="tiny" fill="#15211e" font-weight="400">基态单比特门：两束聚焦 Raman 光</text>
<text x="1227" y="313" class="tiny" fill="#15211e" font-weight="400">Clifford 99.963(2)%（Muniz 2025）</text>
  <rect x="1210" y="358" width="370" height="132" rx="8" fill="#ffffff" stroke="#e74b22" stroke-width="2"/>
<text x="1227" y="385" class="card-title" fill="#e74b22" font-weight="700">578.4 nm：钟态映射</text>
<text x="1227" y="409" class="tiny" fill="#15211e" font-weight="400">¹S₀ ↔ ³P₀；相干搁置与钟态控制</text>
<text x="1227" y="433" class="tiny" fill="#15211e" font-weight="400">连接两个电子流形；不是 Raman 旋转</text>
<text x="1227" y="457" class="tiny" fill="#15211e" font-weight="400">Ma 2023 使用光泵浦初始化</text>
  <rect x="1210" y="502" width="370" height="132" rx="8" fill="#ffffff" stroke="#5b33c5" stroke-width="2"/>
<text x="1227" y="529" class="card-title" fill="#5b33c5" font-weight="700">302 nm：Rydberg 两比特门</text>
<text x="1227" y="553" class="tiny" fill="#15211e" font-weight="400">302 nm：³P₀ |1⟩ ↔ |r⟩</text>
<text x="1227" y="577" class="tiny" fill="#15211e" font-weight="400">ΩRyd/2π≈1.6 MHz；π 脉冲 330 ns</text>
<text x="1227" y="601" class="tiny" fill="#15211e" font-weight="400">计算作用：Rydberg 阻塞型 CZ 门</text>
  <rect x="1210" y="646" width="370" height="132" rx="8" fill="#ffffff" stroke="#9c1743" stroke-width="2"/>
<text x="1227" y="673" class="card-title" fill="#9c1743" font-weight="700">约369 nm：自动电离</text>
<text x="1227" y="697" class="tiny" fill="#15211e" font-weight="400">6s59s ³S₁ → 6p₁/₂59s → Yb⁺+e⁻</text>
<text x="1227" y="721" class="tiny" fill="#15211e" font-weight="400">态选择性移除；用于最终核自旋读出</text>
<text x="1227" y="745" class="tiny" fill="#15211e" font-weight="400">计算作用：Rydberg 错误转擦除记录</text>

  <!-- Decay and repump energy flow -->
  <line x1="0" y1="900" x2="1600" y2="900" stroke="#15211e" stroke-width="2"/>
  <text x="800" y="935" class="section-title" text-anchor="middle">Rydberg 态衰变、770 nm 再泵浦（repump）与擦除检测（Ma 2023）</text>
  <text x="800" y="961" class="small" text-anchor="middle" fill="#53615d">以下为制备在 |r⟩ 后等待与再泵浦得到的实验布居；不是普适分支比，也不是门错误率。</text>
  <g id="decay-repump-flow">
    <rect x="28" y="980" width="522" height="484" rx="10" fill="#fcfbff" stroke="#5b33c5" stroke-width="2"/>
    <text x="48" y="1012" class="section-title" fill="#5b33c5">阶段 A：等待 Rydberg 态衰变</text>
    <text x="48" y="1041" class="small" fill="#15211e" font-weight="400">|r⟩ 初态：6s59s ³S₁</text>
<text x="48" y="1065" class="small" fill="#15211e" font-weight="400">自发衰变：等待约 400 μs</text>
    <text x="48" y="1102" class="micro" font-weight="700">等待后：25% ¹S₀ / 10% ³P₀ / 35% ³P₂ / 30% 未计入</text>
    <line x1="78" y1="1140" x2="254" y2="1140" class="thin-line"/><text x="78" y="1127" class="small">|r⟩  6s59s ³S₁</text>
    <path d="M254 1140 H292 V1400" fill="none" stroke="#15211e" stroke-width="2.5"/>
    <line x1="330" y1="1210" x2="505" y2="1210" class="thin-line"/><text x="340" y="1198" class="small" fill="#187a44" font-weight="700">³P₂  约35%</text>
    <line x1="330" y1="1300" x2="505" y2="1300" class="thin-line"/><text x="340" y="1288" class="small" fill="#e74b22" font-weight="700">³P₀  约10%</text>
    <line x1="330" y1="1380" x2="505" y2="1380" class="thin-line"/><text x="340" y="1368" class="small" fill="#1f5fd1" font-weight="700">¹S₀  约25%</text>
    <line x1="292" y1="1210" x2="326" y2="1210" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/><line x1="292" y1="1300" x2="326" y2="1300" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/><line x1="292" y1="1380" x2="326" y2="1380" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
    <rect x="330" y="1402" width="175" height="40" rx="6" fill="#fff" stroke="#5b33c5" stroke-width="1.5"/><text x="340" y="1428" class="tiny" fill="#5b33c5" font-weight="700">未计入  约30%</text>
    <line x1="292" y1="1400" x2="326" y2="1420" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>

    <!-- Stage B -->
    <rect x="566" y="980" width="510" height="484" rx="10" fill="#fbfefc" stroke="#187a44" stroke-width="2"/>
    <text x="586" y="1012" class="section-title" fill="#187a44">阶段 B：770 nm 再泵浦 ³P₂</text>
    <text x="586" y="1041" class="small" font-weight="700">³P₂ → 6s7s ³S₁：770 nm repump</text>
    <text x="586" y="1067" class="micro" fill="#15211e" font-weight="400">再泵浦后总布居：51% ¹S₀ / 19% ³P₀ / 30% 未计入</text>
<text x="586" y="1089" class="micro" fill="#15211e" font-weight="400">非理想分支：约25%落入³P₀</text>
    <line x1="620" y1="1140" x2="770" y2="1140" class="thin-line"/><text x="620" y="1127" class="small">6s7s ³S₁</text>
    <line x1="620" y1="1210" x2="770" y2="1210" class="thin-line"/><text x="620" y="1198" class="small">³P₂</text>
    <line x1="620" y1="1255" x2="770" y2="1255" class="thin-line"/><text x="620" y="1243" class="small">³P₁</text>
    <line x1="620" y1="1300" x2="770" y2="1300" class="thin-line"/><text x="620" y="1288" class="small">³P₀</text>
    <line x1="620" y1="1380" x2="770" y2="1380" class="thin-line"/><text x="620" y="1368" class="small">¹S₀</text>
    <line x1="665" y1="1200" x2="665" y2="1150" stroke="#e74b22" stroke-width="3" marker-end="url(#arrow-orange)"/><text x="680" y="1182" class="tiny" fill="#e74b22" font-weight="700">770 nm</text>
    <path d="M770 1140 H802 V1380" fill="none" stroke="#15211e" stroke-width="2.5"/>
    <line x1="802" y1="1300" x2="774" y2="1300" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/><line x1="802" y1="1380" x2="774" y2="1380" stroke="#15211e" stroke-width="2" marker-end="url(#arrow-ink)"/>
    <rect x="830" y="1140" width="220" height="240" rx="8" fill="#fff" stroke="#187a44" stroke-width="1.5"/>
    <text x="846" y="1170" class="tiny" fill="#15211e" font-weight="400">770 nm 激发 ³P₂</text>
<text x="846" y="1193" class="tiny" fill="#15211e" font-weight="400">至 6s7s ³S₁，</text>
<text x="846" y="1216" class="tiny" fill="#15211e" font-weight="400">随后自发衰变。</text>
<text x="846" y="1239" class="tiny" fill="#15211e" font-weight="400"></text>
<text x="846" y="1262" class="tiny" fill="#15211e" font-weight="400">最终 ¹S₀：51%</text>
<text x="846" y="1285" class="tiny" fill="#15211e" font-weight="400">最终 ³P₀：19%</text>
<text x="846" y="1308" class="tiny" fill="#15211e" font-weight="400">未计入：约30%</text>
<text x="846" y="1331" class="tiny" fill="#15211e" font-weight="400"></text>
<text x="846" y="1354" class="tiny" fill="#15211e" font-weight="400">替代链可经 ³D₂。</text>

    <!-- Stage C -->
    <rect x="1092" y="980" width="480" height="484" rx="10" fill="#fbfdff" stroke="#1f5fd1" stroke-width="2"/>
    <text x="1112" y="1012" class="section-title" fill="#1f5fd1">阶段 C：399 nm 成像与擦除记录</text>
    <text x="1112" y="1041" class="small" font-weight="700">¹S₀ → ¹P₁：399 nm fluorescence</text>
